<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المهارات الرقمية - موقع تعليمي تفاعلي</title>

  <!-- Preconnect للموارد الخارجية -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

  <!-- Preload للملفات الأساسية -->
  <link rel="preload" href="css/style.css" as="style">
  <link rel="preload" href="js/data-grade4.js" as="script">
  <link rel="preload" href="js/app.js" as="script">
  <!-- Prefetch الصفوف الأخرى في الخلفية -->
  <link rel="prefetch" href="js/data-grade5.js">
  <link rel="prefetch" href="js/data-grade6.js">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== الهيدر ===== -->
  <header>
    <div class="header-inner">
      <div class="logo" onclick="showHome()">
        <div class="logo-icon">💻</div>
        <div class="logo-text">
          المهارات الرقمية
          <span>موقع تعليمي تفاعلي</span>
        </div>
      </div>
      <nav id="breadcrumb" style="flex: 1;"></nav>
      <button class="theme-toggle" onclick="toggleDarkMode()" title="تبديل المظهر الليلي">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <!-- شريط الطالب (ثابت في كل الصفحات) -->
  <div id="student-bar"></div>

  <!-- ===== المحتوى الرئيسي ===== -->
  <main id="main-content">
    <!-- يتم حقن المحتوى هنا بواسطة JavaScript -->
  </main>

  <!-- ===== نافذة الدرس والأسئلة ===== -->
  <div id="lesson-modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeLesson()"></div>
    <div class="modal-box">
      <button class="modal-close" onclick="closeLesson()">✕</button>
      <div id="lesson-content"></div>
    </div>
  </div>

  <!-- ===== نافذة النتيجة ===== -->
  <div id="result-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-box result-box">
      <div id="result-content"></div>
    </div>
  </div>

  <!-- ===== تأثيرات الاحتفالات ===== -->
  <div id="celebration" class="celebration hidden"></div>

  <!-- Firebase SDK (Compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- إعدادات Firebase وطبقة قاعدة البيانات -->
  <script src="js/firebase-config.js" defer></script>
  <script src="js/firebase-db.js" defer></script>

  <!-- data.js هيكل فارغ (140 bytes) + loader للصفوف -->
  <script src="js/data.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/student-auth.js" defer></script>
  <script src="js/curriculum-loader.js" defer></script>
  <script src="js/questions.js" defer></script>
  <script src="js/app.js" defer></script>
  <script src="js/theme.js" defer></script>
  <script src="js/animations.js" defer></script>

  <!-- تسجيل Service Worker للتخزين المؤقت -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[SW] مسجّل:', reg.scope); })
          .catch(function (err) { console.warn('[SW] فشل التسجيل:', err); });
      });
    }
  </script>
</body>
</html>
