<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل متابعة الطلاب - المهارات الرقمية</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
<style>
/* =========================================
   Layout — 100vh مع scroll مستقل لكل منطقة
   ========================================= */
html, body {
  height: 100% !important;
  overflow: hidden !important;
  margin: 0;
  font-family: 'ThmanyahSans', sans-serif;
  background: var(--bg, #f1f5f9);
}

/* الحاوية الرئيسية: flex أفقي يملأ الشاشة */
.st-layout {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ===== Sidebar ===== */
.st-sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--white, #fff);
  border-left: 1px solid var(--border, #e2e8f0);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;              /* يتحكم overflow داخله */
  transition: width .25s ease;
}
.st-sidebar.collapsed { width: 48px; }

.st-sidebar-header {
  padding: 10px 10px 8px;
  border-bottom: 1px solid var(--border, #e2e8f0);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* زر إخفاء/إظهار القائمة */
.st-toggle-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--bg, #f1f5f9);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  transition: background .15s;
  align-self: flex-start;
}
.st-toggle-btn:hover { background: #e2e8f0; }

.st-sidebar-inner {
  overflow: hidden;
  transition: opacity .2s;
}
.st-sidebar.collapsed .st-sidebar-inner { opacity: 0; pointer-events: none; }
.st-sidebar.collapsed .st-nav-scroll { opacity: 0; pointer-events: none; overflow: hidden; }

.st-back-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: 8px;
  background: var(--bg, #f1f5f9); color: var(--text-mid, #64748b);
  font-size: 12px; font-weight: 600; cursor: pointer; border: none;
  width: 100%; transition: background .15s; white-space: nowrap;
}
.st-back-btn:hover { background: #e2e8f0; }
.st-sidebar-title {
  font-size: 11px; font-weight: 700; color: var(--text-mid, #64748b);
  text-transform: uppercase; letter-spacing: .05em;
  padding: 4px 2px 0; white-space: nowrap;
}

/* قائمة الفصول — لها scroll مستقل */
.st-nav-scroll {
  overflow-y: auto;
  overflow-x: hidden;
  flex: 1;
}
.st-grade-section { padding: 6px 0; }
.st-grade-label {
  font-size: 10px; font-weight: 700; color: var(--text-light, #94a3b8);
  padding: 4px 12px; text-transform: uppercase; letter-spacing: .04em;
  white-space: nowrap;
}
.st-class-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 7px 12px;
  background: none; border: none; cursor: pointer;
  text-align: right; font-family: inherit; font-size: 13px;
  font-weight: 600; color: var(--text-dark, #1e293b);
  transition: background .12s; position: relative;
  white-space: nowrap;
}
.st-class-btn:hover { background: var(--bg, #f1f5f9); }
.st-class-btn.active { background: #eff6ff; color: #1d4ed8; }
.st-class-btn.active::before {
  content: ''; position: absolute; right: 0; top: 4px; bottom: 4px;
  width: 3px; background: #1d4ed8; border-radius: 2px;
}
.st-count-badge {
  margin-right: auto; font-size: 10px; font-weight: 700;
  background: var(--bg, #f1f5f9); color: var(--text-mid, #64748b);
  padding: 1px 6px; border-radius: 20px; flex-shrink: 0;
}
.st-class-btn.active .st-count-badge { background: #dbeafe; color: #1d4ed8; }

/* ===== Main — يتمرر هو نفسه ===== */
.st-main {
  flex: 1;
  min-width: 0;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* شريط الرأس — ثابت لا يتمرر */
.st-header {
  padding: 16px 20px 12px;
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; flex-shrink: 0;
  background: var(--bg, #f1f5f9);
  border-bottom: 1px solid var(--border, #e2e8f0);
}
.st-page-title { font-size: 20px; font-weight: 900; flex: 1; min-width: 0; }

/* منطقة المحتوى — تتمرر عمودياً فقط للنظرة العامة */
.st-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
}

.st-search {
  padding: 7px 12px; border-radius: 10px;
  border: 1.5px solid var(--border, #e2e8f0);
  font-family: inherit; font-size: 13px; width: 180px;
  background: var(--white, #fff); outline: none;
}
.st-search:focus { border-color: #3b82f6; }
.st-filter-select {
  padding: 7px 10px; border-radius: 10px;
  border: 1.5px solid var(--border, #e2e8f0);
  font-family: inherit; font-size: 13px;
  background: var(--white, #fff); outline: none; cursor: pointer;
}

/* ===== Overview Cards ===== */
.st-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap: 12px; margin-bottom: 20px;
}
.st-card {
  background: var(--white, #fff); border-radius: 14px;
  padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.st-card-label { font-size: 11px; color: var(--text-mid, #64748b); font-weight: 600; margin-bottom: 4px; }
.st-card-val { font-size: 24px; font-weight: 900; }
.st-card-sub { font-size: 11px; color: var(--text-light, #94a3b8); margin-top: 2px; }

/* ===== Overview charts grid ===== */
.st-ov-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media(max-width:900px){ .st-ov-grid { grid-template-columns: 1fr; } }

/* ===== Class cards ===== */
.st-cls-card {
  background: var(--white, #fff); border-radius: 12px;
  padding: 14px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.06);
  border: 2px solid transparent; transition: all .2s;
}
.st-cls-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
.st-cls-name { font-size: 15px; font-weight: 900; margin-bottom: 4px; }
.st-cls-stats { font-size: 11px; color: var(--text-mid, #64748b); }
.st-cls-bar { height: 5px; border-radius: 3px; background: #e2e8f0; margin-top: 8px; overflow: hidden; }
.st-cls-fill { height: 100%; border-radius: 3px; }

/* ===== Student Table ===== */
.st-table-wrap {
  background: var(--white, #fff);
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  overflow: hidden; /* يُبقي الحواف المستديرة مع st-table-scroll الداخلي */
}
.st-table-head {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border, #e2e8f0);
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; flex-shrink: 0;
}
.st-class-title { font-size: 16px; font-weight: 900; }
.st-stat-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.st-chip {
  font-size: 11px; font-weight: 700; padding: 3px 9px;
  border-radius: 20px; background: var(--bg, #f1f5f9);
  color: var(--text-mid, #64748b);
}

/* حاوية التمرير — ارتفاع ثابت يمنح الجدول مساحة التمرير */
.st-table-scroll {
  overflow-y: auto;
  overflow-x: hidden;
  height: calc(100vh - 168px);
}
table.st-table {
  border-collapse: collapse;
  font-size: 13px;
  min-width: 1620px;   /* العرض الطبيعي الكامل للجدول (31 عمود) */
  /* بدون width:100% حتى لا ينضغط الجدول في الحاوية */
}
table.st-table th {
  padding: 7px 9px; text-align: center;
  background: #f8fafc;
  border-bottom: 2px solid var(--border, #e2e8f0);
  font-size: 11px; font-weight: 700;
  color: var(--text-mid, #64748b);
  white-space: nowrap;
  position: sticky; top: 0; z-index: 2;   /* عناوين ثابتة عند التمرير العمودي */
}
table.st-table th.th-name {
  text-align: right; padding-right: 14px;
  min-width: 170px;
  position: sticky; right: 0; top: 0;     /* عمود الاسم ثابت يميناً */
  background: #f8fafc; z-index: 4;
  box-shadow: -3px 0 6px rgba(0,0,0,.06);
}
table.st-table th.th-num { min-width: 34px; }
table.st-table td {
  padding: 7px 8px; text-align: center;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
}
table.st-table td.td-name {
  text-align: right; padding-right: 14px;
  font-weight: 700; font-size: 13px;
  position: sticky; right: 0;             /* عمود الاسم ثابت عند التمرير الأفقي */
  background: var(--white, #fff); z-index: 1;
  box-shadow: -3px 0 6px rgba(0,0,0,.06);
}
table.st-table td.td-num { color: var(--text-light, #94a3b8); font-size: 12px; }
table.st-table tr:hover td { background: #f8faff; }
table.st-table tr:hover td.td-name { background: #f8faff; }

.th-group {
  background: #eff6ff !important;
  color: #1d4ed8 !important;
  border-top: 2px solid #3b82f6;
  font-size: 10px;
}

/* خلايا قابلة للتعديل */
.cell-edit {
  display: inline-block; min-width: 30px; padding: 3px 6px;
  border-radius: 6px; cursor: pointer; transition: background .12s;
  font-family: inherit; font-size: 13px;
}
.cell-edit:hover { background: #eff6ff; }

.cell-check {
  width: 22px; height: 22px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; transition: all .15s;
}
.cell-check.done { background: #dcfce7; color: #16a34a; }
.cell-check.miss { background: #f1f5f9; color: #cbd5e1; }
.cell-check:hover { transform: scale(1.15); }

/* بادج المجموع */
.total-badge {
  font-size: 13px; font-weight: 900; padding: 3px 10px;
  border-radius: 20px; display: inline-block; min-width: 42px;
}
.total-exc  { background: #dcfce7; color: #15803d; }
.total-good { background: #dbeafe; color: #1d4ed8; }
.total-mid  { background: #fef9c3; color: #a16207; }
.total-low  { background: #fee2e2; color: #b91c1c; }
.total-none { background: #f1f5f9; color: #94a3b8; }

/* السلوك */
.beh-pos { background: #dcfce7; color: #15803d; padding: 2px 7px; border-radius: 20px; font-weight: 700; font-size: 12px; }
.beh-neg { background: #fee2e2; color: #b91c1c; padding: 2px 7px; border-radius: 20px; font-weight: 700; font-size: 12px; }
.beh-zero { color: #94a3b8; font-size: 12px; }

/* أزرار */
.st-export-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 10px;
  background: #1d4ed8; color: white; border: none;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.st-export-btn:hover { background: #1e40af; }
.save-ind { font-size: 12px; color: #10b981; font-weight: 600; opacity: 0; transition: opacity .3s; white-space: nowrap; }
.save-ind.show { opacity: 1; }

/* Chart bars */
.chart-area { padding: 14px 18px 18px; }
.chart-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.chart-bar-label { width: 65px; font-size: 11px; font-weight: 700; text-align: right; flex-shrink: 0; }
.chart-bar-track { flex: 1; height: 18px; background: #f1f5f9; border-radius: 9px; overflow: hidden; }
.chart-bar-fill { height: 100%; border-radius: 9px; display: flex; align-items: center; padding-right: 8px; }
.chart-bar-val { font-size: 10px; font-weight: 700; color: white; }

/* ===== الجدول الموجز (compact) ===== */
.st-summary-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 13px;
}
.st-summary-table th {
  padding: 8px 10px; text-align: center;
  background: #f8fafc;
  border-bottom: 2px solid var(--border, #e2e8f0);
  font-size: 11px; font-weight: 700;
  color: var(--text-mid, #64748b);
  white-space: nowrap;
  position: sticky; top: 0; z-index: 2;
}
.st-summary-table th.th-name { text-align: right; padding-right: 14px; min-width: 170px; }
.st-summary-table td {
  padding: 8px 10px; text-align: center;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
}
.st-summary-table td.td-name {
  text-align: right; padding-right: 14px;
  font-weight: 700;
}
.st-summary-table td.td-num { color: var(--text-light, #94a3b8); font-size: 12px; width: 36px; }
.st-summary-table tr:hover td { background: #f8faff; }

/* خلية المجموع الفرعي — قابلة للنقر لتوسيع التفاصيل */
.score-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  border: 1.5px solid transparent;
  background: #f1f5f9; color: #475569;
}
.score-pill:hover { background: #e0e7ff; color: #3730a3; border-color: #6366f1; }
.score-pill.active { background: #e0e7ff; color: #3730a3; border-color: #6366f1; }
.score-pill .sp-val { font-size: 14px; }
.score-pill .sp-arrow { font-size: 9px; opacity: .5; }

/* صف التوسع للتفاصيل */
.expand-row td {
  padding: 0 !important;
  background: #f8faff !important;
  border-bottom: 2px solid #e0e7ff !important;
}
.expand-panel {
  padding: 14px 18px;
  display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start;
}
.expand-cat { display: flex; flex-direction: column; gap: 6px; }
.expand-cat-label {
  font-size: 10px; font-weight: 700; color: #6366f1;
  text-transform: uppercase; letter-spacing: .04em;
}
.expand-checks {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.exp-check-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.exp-check-label { font-size: 9px; color: #94a3b8; }

/* Responsive */
@media(max-width:768px){
  html, body { overflow: auto !important; height: auto !important; }
  .st-layout { height: auto; flex-direction: column; overflow: visible; }
  .st-sidebar { width: 100% !important; height: auto; border-left: none; border-bottom: 1px solid var(--border); }
  .st-sidebar.collapsed { height: 48px; }
  .st-sidebar-inner { opacity: 1 !important; pointer-events: auto !important; }
  .st-nav-scroll { max-height: 200px; }
  .st-main { height: auto; overflow: visible; }
  .st-content { overflow: visible; }
}
</style>
</head>
<body>

<div class="st-layout">
  <!-- Sidebar -->
  <aside class="st-sidebar" id="st-sidebar">
    <div class="st-sidebar-header">
      <button class="st-toggle-btn" onclick="toggleSidebar()" title="إخفاء/إظهار القائمة">☰</button>
      <div class="st-sidebar-inner">
        <button class="st-back-btn" onclick="history.back()">← لوحة التحكم</button>
        <div class="st-sidebar-title">الفصول الدراسية</div>
      </div>
    </div>

    <div class="st-nav-scroll">
      <div id="sidebar-nav"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="st-main">
    <div class="st-header">
      <div class="st-page-title" id="page-title">📊 سجل متابعة الطلاب</div>
      <input class="st-search" id="search-input" placeholder="🔍 ابحث باسم الطالب..." oninput="filterStudents()" style="display:none">
      <select class="st-filter-select" id="sort-select" onchange="filterStudents()" style="display:none">
        <option value="">ترتيب: الافتراضي</option>
        <option value="total-desc">الأعلى درجة أولاً</option>
        <option value="total-asc">الأدنى درجة أولاً</option>
        <option value="name">الاسم أبجدياً</option>
        <option value="behavior">السلوك</option>
      </select>
      <span class="save-ind" id="save-ind">✓ تم الحفظ</span>
      <button class="st-export-btn" id="export-btn" onclick="exportClass()" style="display:none">⬇ تصدير Excel</button>
    </div>

    <div class="st-content">
      <div id="main-content"></div>
    </div>
  </main>
</div>

let DATA = JSON.parse(JSON.stringify(RAW_DATA));
// مفتاح مختلف تماماً عن ibn_moshrf_students (الذي يستخدمه نظام تسجيل الطلاب)
const STORE_KEY = 'ibn_moshrf_class_tracking';

function _isValidTrackingData(d) {
  // التحقق أن البيانات المحملة لها مفاتيح فصول صحيحة (مثل 4أ-ف1) وليس UUIDs
  if (!d || typeof d !== 'object') return false;
  const keys = Object.keys(d);
  if (!keys.length) return false;
  return keys.some(k => /^[456][أب]-ف[12]$/.test(k));
}

function loadData() {
  try {
    const saved = localStorage.getItem(STORE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (_isValidTrackingData(parsed)) DATA = parsed;
    }
  } catch(e) {}
}
function saveData() {
  localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
  const ind = document.getElementById('save-ind');
  ind.classList.add('show');
  clearTimeout(ind._t);
  ind._t = setTimeout(() => ind.classList.remove('show'), 2000);
}
loadData();

// Classes grouping
const CLASSES = Object.keys(DATA);
const GRADES = ['رابع', 'خامس', 'سادس'];
const GRADE_CLASSES = {
  'رابع':  CLASSES.filter(c => c.startsWith('4')),
  'خامس': CLASSES.filter(c => c.startsWith('5')),
  'سادس': CLASSES.filter(c => c.startsWith('6')),
};

let activeClass = null;

// إخفاء/إظهار الشريط الجانبي
function toggleSidebar() {
  const sb = document.getElementById('st-sidebar');
  const btn = sb.querySelector('.st-toggle-btn');
  sb.classList.toggle('collapsed');
  btn.textContent = sb.classList.contains('collapsed') ? '»' : '☰';
}

// Build sidebar
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  // Overview button
  const ovBtn = document.createElement('div');
  ovBtn.className = 'st-grade-section';
  ovBtn.innerHTML = `<button class="st-class-btn active" id="btn-overview" onclick="showOverview()">
    🏠 نظرة عامة <span class="st-count-badge">${CLASSES.reduce((a,c)=>a+DATA[c].length,0)}</span>
  </button>`;
  nav.appendChild(ovBtn);

  GRADES.forEach(g => {
    const cls = GRADE_CLASSES[g];
    if (!cls.length) return;
    const sec = document.createElement('div');
    sec.className = 'st-grade-section';
    sec.innerHTML = `<div class="st-grade-label">${g}</div>`;
    cls.forEach(c => {
      const label = c.replace('ف1','- فصل١').replace('ف2','- فصل٢').replace('أ','أ').replace('ب','ب');
      const btn = document.createElement('button');
      btn.className = 'st-class-btn';
      btn.id = `btn-${c}`;
      btn.onclick = () => showClass(c);
      btn.innerHTML = `${label} <span class="st-count-badge">${DATA[c].length}</span>`;
      sec.appendChild(btn);
    });
    nav.appendChild(sec);
  });
}

function setActive(id) {
  document.querySelectorAll('.st-class-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById(`btn-${id}`);
  if (el) el.classList.add('active');
}

function showOverview() {
  activeClass = null;
  setActive('overview');
  document.getElementById('page-title').textContent = '📊 سجل متابعة الطلاب';
  document.getElementById('search-input').style.display = 'none';
  document.getElementById('sort-select').style.display = 'none';
  document.getElementById('export-btn').style.display = 'none';

  const totalStudents = CLASSES.reduce((a,c) => a + DATA[c].length, 0);
  const allStudents = CLASSES.flatMap(c => DATA[c]);
  const withTotal = allStudents.filter(s => s.total != null && s.total > 0);
  const avgTotal = withTotal.length ? (withTotal.reduce((a,s) => a+s.total, 0) / withTotal.length).toFixed(1) : '-';
  const completionRate = withTotal.length ? Math.round(withTotal.length / allStudents.length * 100) : 0;

  // Count by grade
  const gradeCounts = {};
  GRADES.forEach(g => {
    gradeCounts[g] = GRADE_CLASSES[g].reduce((a,c) => a + DATA[c].length, 0);
  });

  // Build class cards data
  const classCardsHTML = CLASSES.map(cls => {
    const students = DATA[cls];
    const withT = students.filter(s => s.total != null && s.total > 0);
    const avg = withT.length ? (withT.reduce((a,s) => a+s.total,0)/withT.length).toFixed(1) : null;
    const pct = avg ? Math.round(avg) : 0;
    const color = pct >= 90 ? '#10b981' : pct >= 75 ? '#3b82f6' : pct >= 60 ? '#f59e0b' : pct > 0 ? '#ef4444' : '#cbd5e1';
    const label = cls.replace('ف1','ف١').replace('ف2','ف٢');
    return `<div class="st-cls-card" onclick="showClass('${cls}')">
      <div class="st-cls-name">${label}</div>
      <div class="st-cls-stats">${students.length} طالب — متوسط: ${avg || 'لم يُدخل'}</div>
      <div class="st-cls-bar"><div class="st-cls-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');

  // Chart data
  const chartHTML = CLASSES.map(cls => {
    const students = DATA[cls];
    const withT = students.filter(s => s.total != null && s.total > 0);
    const avg = withT.length ? Math.round(withT.reduce((a,s)=>a+s.total,0)/withT.length) : 0;
    const color = avg >= 90 ? '#10b981' : avg >= 75 ? '#3b82f6' : avg >= 60 ? '#f59e0b' : avg > 0 ? '#ef4444' : '#e2e8f0';
    const label = cls.replace('ف1','ف١').replace('ف2','ف٢');
    return `<div class="chart-bar-row">
      <div class="chart-bar-label">${label}</div>
      <div class="chart-bar-track">
        <div class="chart-bar-fill" style="width:${avg}%;background:${color}">
          ${avg > 10 ? `<span class="chart-bar-val">${avg}</span>` : ''}
        </div>
      </div>
      <div style="font-size:11px;font-weight:700;color:#64748b;width:32px">${avg || '-'}</div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="st-cards">
      <div class="st-card"><div class="st-card-label">إجمالي الطلاب</div><div class="st-card-val" style="color:#3b82f6">${totalStudents}</div><div class="st-card-sub">${CLASSES.length} فصل</div></div>
      <div class="st-card"><div class="st-card-label">متوسط الدرجات</div><div class="st-card-val" style="color:#10b981">${avgTotal}</div><div class="st-card-sub">من 100</div></div>
      <div class="st-card"><div class="st-card-label">تم إدخال البيانات</div><div class="st-card-val" style="color:#f59e0b">${completionRate}%</div><div class="st-card-sub">${withTotal.length} من ${allStudents.length} طالب</div></div>
      <div class="st-card"><div class="st-card-label">رابع</div><div class="st-card-val">${gradeCounts['رابع']}</div><div class="st-card-sub">طالب</div></div>
      <div class="st-card"><div class="st-card-label">خامس</div><div class="st-card-val">${gradeCounts['خامس']}</div><div class="st-card-sub">طالب</div></div>
      <div class="st-card"><div class="st-card-label">سادس</div><div class="st-card-val">${gradeCounts['سادس']}</div><div class="st-card-sub">طالب</div></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;flex-wrap:wrap">
      <div style="background:var(--white,#fff);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden">
        <div style="padding:14px 20px;font-size:15px;font-weight:900;border-bottom:1px solid #f1f5f9">الفصول الدراسية</div>
        <div class="chart-area">${chartHTML}</div>

        <div style="padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px">${classCardsHTML}</div>

// ===== Class View =====
let filteredStudents = [];

function showClass(cls) {
  activeClass = cls;
  setActive(cls);
  const label = cls.replace('ف1','فصل١').replace('ف2','فصل٢');
  document.getElementById('page-title').textContent = `📋 ${label}`;
  document.getElementById('search-input').style.display = '';
  document.getElementById('search-input').value = '';
  document.getElementById('sort-select').style.display = '';
  document.getElementById('export-btn').style.display = '';
  renderClassTable(cls);
}

function getGradeColor(total) {
  if (total == null || total === 0) return 'total-none';
  if (total >= 90) return 'total-exc';
  if (total >= 75) return 'total-good';
  if (total >= 60) return 'total-mid';
  return 'total-low';
}

function filterStudents() {
  if (!activeClass) return;
  renderClassTable(activeClass);
}

// حالة الصفوف الموسّعة { 'cls-idx-cat': true }
let expandedRows = {};

function renderClassTable(cls) {
  const students = DATA[cls];
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let list = students.filter(s => !q || s.name.includes(q));
  if (sort === 'total-desc') list = [...list].sort((a,b) => (b.total||0)-(a.total||0));
  else if (sort === 'total-asc') list = [...list].sort((a,b) => (a.total||0)-(b.total||0));
  else if (sort === 'name') list = [...list].sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'behavior') list = [...list].sort((a,b) => (b.behavior||0)-(a.behavior||0));

  filteredStudents = list;

  const withT = students.filter(s => s.total != null && s.total > 0);
  const avg = withT.length ? (withT.reduce((a,s)=>a+s.total,0)/withT.length).toFixed(1) : '-';
  const high = withT.length ? Math.max(...withT.map(s=>s.total)).toFixed(1) : '-';
  const low  = withT.length ? Math.min(...withT.map(s=>s.total)).toFixed(1) : '-';

  // دالة مساعدة: رسم pill المجموع الفرعي
  function scorePill(val, max, cat, realIdx) {
    const key = `${cls}-${realIdx}-${cat}`;
    const isOpen = !!expandedRows[key];
    const pct = val != null ? Math.round((val / max) * 100) : null;
    const color = pct == null ? '#f1f5f9'
                : pct >= 90 ? '#dcfce7' : pct >= 75 ? '#dbeafe'
                : pct >= 60 ? '#fef9c3' : '#fee2e2';
    const textColor = pct == null ? '#94a3b8'
                    : pct >= 90 ? '#15803d' : pct >= 75 ? '#1d4ed8'
                    : pct >= 60 ? '#a16207' : '#b91c1c';
    const display = val != null ? val.toFixed(1) : '—';
    return `<span class="score-pill${isOpen?' active':''}"
      style="${val!=null?`background:${color};color:${textColor};border-color:${textColor}40`:''}"
      onclick="toggleExpand('${cls}',${realIdx},'${cat}')"
      title="انقر لعرض/تعديل التفاصيل">
      <span class="sp-val">${display}</span><span class="sp-arrow">/${max} ▾</span>
    </span>`;
  }

  // دالة مساعدة: رسم خلية رقمية قابلة للتعديل
  function numPill(field, realIdx, max) {
    const val = students[realIdx][field];
    const display = val != null ? val : '—';
    const color = max === 40
      ? (val >= 36?'#dcfce7': val >= 30?'#dbeafe': val >= 24?'#fef9c3':'#f1f5f9')
      : (val >= 18?'#dcfce7': val >= 15?'#dbeafe': val >= 12?'#fef9c3':'#f1f5f9');
    const textColor = max === 40
      ? (val >= 36?'#15803d': val >= 30?'#1d4ed8': val >= 24?'#a16207':'#475569')
      : (val >= 18?'#15803d': val >= 15?'#1d4ed8': val >= 12?'#a16207':'#475569');
    return `<span class="score-pill" style="${val!=null?`background:${color};color:${textColor}`:''}"
      onclick="editCell(this,'${cls}',${realIdx},'${field}',${max})"
      title="انقر للتعديل">
      <span class="sp-val">${display}</span><span class="sp-arrow">/${max} ✎</span>
    </span>`;
  }

  // بناء صفوف الجدول
  let rowsHTML = '';
  list.forEach((s, i) => {
    const realIdx = students.indexOf(s);
    const totalClass = getGradeColor(s.total);
    const beh = s.behavior == null
      ? `<span class="beh-zero" style="cursor:pointer" onclick="editBehavior('${cls}',${realIdx})">—</span>`
      : s.behavior > 0
        ? `<span class="beh-pos" style="cursor:pointer" onclick="editBehavior('${cls}',${realIdx})">+${s.behavior}</span>`
        : s.behavior < 0
          ? `<span class="beh-neg" style="cursor:pointer" onclick="editBehavior('${cls}',${realIdx})">${s.behavior}</span>`
          : `<span class="beh-zero" style="cursor:pointer" onclick="editBehavior('${cls}',${realIdx})">0</span>`;

    // صف الملخص
    rowsHTML += `<tr data-idx="${realIdx}">
      <td class="td-num">${s.num || i+1}</td>
      <td class="td-name">${s.name}</td>
      <td>${scorePill(s.w_total, 10, 'w', realIdx)}</td>
      <td>${scorePill(s.b_total, 10, 'b', realIdx)}</td>
      <td>${scorePill(s.t_total, 10, 't', realIdx)}</td>
      <td>${scorePill(s.m_total, 10, 'm', realIdx)}</td>
      <td>${numPill('practical', realIdx, 40)}</td>
      <td>${numPill('written', realIdx, 20)}</td>
      <td><span class="total-badge ${totalClass}">${s.total != null && s.total > 0 ? s.total.toFixed(1) : '—'}</span></td>
      <td>${beh}</td>
    </tr>`;

    // صفوف التوسع للفئات المفتوحة
    const cats = [
      { key:'w', label:'واجبات', fields:['w1','w2','w3','w4','w5','w6'], labels:['و١','و٢','و٣','و٤','و٥','و٦'] },
      { key:'b', label:'بحوث',   fields:['b1','b2','b3','b4'],           labels:['ب١','ب٢','ب٣','ب٤'] },
      { key:'t', label:'تفاعل',  fields:['t1','t2','t3','t4','t5','t6'], labels:['ت١','ت٢','ت٣','ت٤','ت٥','ت٦'] },
      { key:'m', label:'مشاركة', fields:['m1','m2','m3','m4','m5'],      labels:['م١','م٢','م٣','م٤','م٥'] },
    ];

    const openCats = cats.filter(c => expandedRows[`${cls}-${realIdx}-${c.key}`]);
    if (openCats.length) {
      const panelContent = openCats.map(cat => `
        <div class="expand-cat">
          <div class="expand-cat-label">${cat.label}</div>
          <div class="expand-checks">
            ${cat.fields.map((f, fi) => {
              const val = s[f];
              const isDone = val === 1;
              return `<div class="exp-check-item">
                <span class="cell-check ${isDone?'done':'miss'}"
                  onclick="toggleCheck('${cls}',${realIdx},'${f}')">${isDone?'✓':'·'}</span>
                <span class="exp-check-label">${cat.labels[fi]}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`).join('');
      rowsHTML += `<tr class="expand-row">
        <td colspan="10">
          <div class="expand-panel">${panelContent}</div>
        </td>
      </tr>`;
    }
  });

  document.getElementById('main-content').innerHTML = `
    <div class="st-table-wrap">
      <div class="st-table-head">
        <div class="st-class-title">${cls.replace('ف1','فصل١').replace('ف2','فصل٢')}</div>
        <div class="st-stat-chips">
          <span class="st-chip">👥 ${students.length} طالب</span>
          <span class="st-chip">📊 متوسط: ${avg}</span>
          <span class="st-chip">⬆ أعلى: ${high}</span>
          <span class="st-chip">⬇ أدنى: ${low}</span>
        </div>
      </div>
      <div class="st-table-scroll">
        <table class="st-summary-table">
          <thead>
            <tr>
              <th style="width:36px">#</th>
              <th class="th-name">اسم الطالب</th>
              <th>واجبات<br><small style="font-weight:400;color:#94a3b8">/10</small></th>
              <th>بحوث<br><small style="font-weight:400;color:#94a3b8">/10</small></th>
              <th>تفاعل<br><small style="font-weight:400;color:#94a3b8">/10</small></th>
              <th>مشاركة<br><small style="font-weight:400;color:#94a3b8">/10</small></th>
              <th>عملي<br><small style="font-weight:400;color:#94a3b8">/40</small></th>
              <th>تحريري<br><small style="font-weight:400;color:#94a3b8">/20</small></th>
              <th>المجموع<br><small style="font-weight:400;color:#94a3b8">/100</small></th>
              <th>السلوك</th>
            </tr>
          </thead>
          <tbody>${rowsHTML}</tbody>
        </table>
      </div>
    </div>`;
}

// توسيع/طي صف التفاصيل
function toggleExpand(cls, idx, cat) {
  const key = `${cls}-${idx}-${cat}`;
  if (expandedRows[key]) delete expandedRows[key];
  else expandedRows[key] = true;
  renderClassTable(cls);
}

// تعديل السلوك
function editBehavior(cls, idx) {
  const cur = DATA[cls][idx].behavior;
  const val = prompt('أدخل قيمة السلوك (موجب أو سالب):', cur != null ? cur : '');
  if (val === null) return;
  DATA[cls][idx].behavior = val === '' ? null : parseInt(val);
  saveData();
  renderClassTable(cls);
}

// Toggle check (واجبات/بحوث/تفاعل/مشاركة)
function toggleCheck(cls, idx, field) {
  const s = DATA[cls][idx];
  s[field] = s[field] === 1 ? null : 1;
  // Recalculate totals
  recalcStudent(cls, idx);
  saveData();
  renderClassTable(cls);
}

// Edit numeric cell (practical/written/behavior)
function editCell(el, cls, idx, field, max) {
  if (el.classList.contains('editing')) return;
  el.classList.add('editing');
  const old = DATA[cls][idx][field];
  const input = document.createElement('input');
  input.type = 'number'; input.min = 0; input.max = max || 999;
  input.value = old != null ? old : '';
  input.style.cssText = 'width:60px;border:none;background:transparent;font-family:inherit;font-size:13px;text-align:center;outline:none';
  el.innerHTML = ''; el.appendChild(input);
  input.focus(); input.select();

  function commit() {
    const val = input.value.trim();
    DATA[cls][idx][field] = val === '' ? null : parseFloat(val);
    recalcStudent(cls, idx);
    saveData();
    renderClassTable(cls);
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if(e.key==='Enter') commit(); if(e.key==='Escape'){el.classList.remove('editing');renderClassTable(cls);} });
}

function recalcStudent(cls, idx) {
  const s = DATA[cls][idx];
  // واجبات: sum(w1..w6)/6 * 10
  const ws = ['w1','w2','w3','w4','w5','w6'].map(k => s[k] === 1 ? 1 : 0);
  s.w_total = ws.reduce((a,v)=>a+v,0) > 0 ? parseFloat((ws.reduce((a,v)=>a+v,0)/6*10).toFixed(2)) : 0;
  // بحوث: sum(b1..b4)/4 * 10
  const bs = ['b1','b2','b3','b4'].map(k => s[k] === 1 ? 1 : 0);
  s.b_total = bs.reduce((a,v)=>a+v,0) > 0 ? parseFloat((bs.reduce((a,v)=>a+v,0)/4*10).toFixed(2)) : 0;
  // تفاعل: sum(t1..t6)/6 * 10
  const ts = ['t1','t2','t3','t4','t5','t6'].map(k => s[k] === 1 ? 1 : 0);
  s.t_total = ts.reduce((a,v)=>a+v,0) > 0 ? parseFloat((ts.reduce((a,v)=>a+v,0)/6*10).toFixed(2)) : 0;
  // مشاركة: sum(m1..m5)/5 * 10
  const ms = ['m1','m2','m3','m4','m5'].map(k => s[k] === 1 ? 1 : 0);
  s.m_total = ms.reduce((a,v)=>a+v,0) > 0 ? parseFloat((ms.reduce((a,v)=>a+v,0)/5*10).toFixed(2)) : 0;
  // المجموع
  const total = (s.w_total||0) + (s.b_total||0) + (s.t_total||0) + (s.m_total||0) + (s.practical||0) + (s.written||0);
  s.total = total > 0 ? parseFloat(total.toFixed(2)) : null;
}

// Export
function exportClass() {
  if (!activeClass) return;
  const students = DATA[activeClass];
  const rows = [['#','الاسم','و1','و2','و3','و4','و5','و6','مج واجبات','ب1','ب2','ب3','ب4','مج بحوث','ت1','ت2','ت3','ت4','ت5','ت6','مج تفاعل','م1','م2','م3','م4','م5','مج مشاركة','عملي/40','تحريري/20','المجموع/100','السلوك']];
  students.forEach(s => rows.push([
    s.num, s.name,
    s.w1,s.w2,s.w3,s.w4,s.w5,s.w6,s.w_total,
    s.b1,s.b2,s.b3,s.b4,s.b_total,
    s.t1,s.t2,s.t3,s.t4,s.t5,s.t6,s.t_total,
    s.m1,s.m2,s.m3,s.m4,s.m5,s.m_total,
    s.practical,s.written,s.total,s.behavior
  ]));
  // CSV export (simple, no SheetJS needed)
  const csv = rows.map(r => r.map(v => v == null ? '' : `"${v}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${activeClass}_متابعة.csv`;
  a.click();
}

// Init
buildSidebar();
showOverview();
</script>
